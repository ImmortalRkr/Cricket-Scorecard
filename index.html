<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turf Cricket Scorecard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center p-4">

    <div id="scorecard-area" class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 border border-gray-200">
        
        <h1 class="text-2xl font-black text-center text-emerald-600 tracking-wide mb-4">🏏 TURF SCORECARD</h1>
        
        <div class="bg-emerald-50 rounded-xl p-4 text-center border border-emerald-200 mb-6">
            <div class="text-sm font-semibold text-emerald-700 uppercase tracking-wider">Total Score</div>
            <div class="text-5xl font-extrabold text-gray-800 my-1">
                <span id="runs">0</span> / <span id="wickets">0</span>
            </div>
            <div class="text-sm text-gray-500 font-medium">
                Overs: <span id="overs">0.0</span>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-6">
            <button onclick="addRuns(1)" class="bg-gray-800 text-white font-bold py-4 rounded-xl shadow active:scale-95 transition text-lg">+1</button>
            <button onclick="addRuns(2)" class="bg-gray-800 text-white font-bold py-4 rounded-xl shadow active:scale-95 transition text-lg">+2</button>
            <button onclick="addRuns(4)" class="bg-emerald-600 text-white font-bold py-4 rounded-xl shadow active:scale-95 transition text-lg">🔥 +4</button>
            <button onclick="addRuns(6)" class="bg-indigo-600 text-white font-bold py-4 rounded-xl shadow active:scale-95 transition text-lg">🚀 +6</button>
            <button onclick="addExtra('wd')" class="bg-amber-500 text-white font-bold py-4 rounded-xl shadow active:scale-95 transition text-base">Wide</button>
            <button onclick="addExtra('nb')" class="bg-amber-600 text-white font-bold py-4 rounded-xl shadow active:scale-95 transition text-base">No Ball</button>
        </div>

        <button onclick="takeWicket()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-extrabold py-4 rounded-xl shadow-lg active:scale-95 transition tracking-wide text-lg mb-6">
            ☝️ OUT / WICKET
        </button>

        <hr class="border-gray-200 my-4">

        <div class="flex gap-3">
            <button onclick="resetScore()" class="w-1/3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 rounded-lg text-sm transition">
                Reset
            </button>
            <button onclick="downloadPDF()" class="w-2/3 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold py-3 rounded-lg text-sm shadow transition flex items-center justify-center gap-2">
                📥 Download PDF
            </button>
        </div>
    </div>

    <script>
        let runs = 0;
        let wickets = 0;
        let balls = 0;

        function updateDisplay() {
            document.getElementById('runs').innerText = runs;
            document.getElementById('wickets').innerText = wickets;
            
            let calculatedOvers = Math.floor(balls / 6);
            let remainderBalls = balls % 6;
            document.getElementById('overs').innerText = `${calculatedOvers}.${remainderBalls}`;
        }

        function addRuns(amount) {
            runs += amount;
            balls += 1;
            updateDisplay();
        }

        function addExtra(type) {
            runs += 1; // 1 run penalty for wides/no-balls
            // Note: In turf cricket, extra balls usually don't add to the ball count
            updateDisplay();
        }

        function takeWicket() {
            if (wickets < 10) {
                wickets += 1;
                balls += 1;
                updateDisplay();
            }
        }

        function resetScore() {
            if(confirm("Are you sure you want to clear the scorecard?")) {
                runs = 0;
                wickets = 0;
                balls = 0;
                updateDisplay();
            }
        }

        function downloadPDF() {
            const element = document.getElementById('scorecard-area');
            const options = {
                margin:       15,
                filename:     `Turf_Match_Scorecard.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 3 }, // Higher scale means sharper text on phone screens
                jsPDF:        { unit: 'mm', format: 'a5', orientation: 'portrait' }
            };
            html2pdf().set(options).from(element).save();
        }
    </script>
</body>
</html>
